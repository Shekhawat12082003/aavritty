<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#172554"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#sky)"/>
  <!-- warehouse shelves -->
  <rect x="0" y="400" width="1280" height="320" fill="#1e293b"/>
  <rect x="80" y="200" width="200" height="400" fill="#334155" opacity="0.8"/>
  <rect x="320" y="250" width="200" height="350" fill="#334155" opacity="0.8"/>
  <rect x="560" y="180" width="200" height="420" fill="#334155" opacity="0.8"/>
  <rect x="800" y="220" width="200" height="380" fill="#334155" opacity="0.8"/>
  <rect x="1040" y="260" width="200" height="340" fill="#334155" opacity="0.8"/>
  <!-- electrical boxes on shelves -->
  <rect x="100" y="280" width="60" height="40" rx="4" fill="#f97316"/>
  <rect x="180" y="280" width="60" height="40" rx="4" fill="#3b82f6"/>
  <rect x="340" y="330" width="60" height="40" rx="4" fill="#22c55e"/>
  <rect x="580" y="260" width="60" height="40" rx="4" fill="#f97316"/>
  <rect x="820" y="300" width="60" height="40" rx="4" fill="#eab308"/>
  <!-- wire coils -->
  <circle cx="400" cy="450" r="50" fill="none" stroke="#fcd34d" stroke-width="8"/>
  <circle cx="700" cy="480" r="45" fill="none" stroke="#fcd34d" stroke-width="7"/>
  <!-- glow -->
  <ellipse cx="640" cy="600" rx="400" ry="80" fill="url(#glow)"/>
  <!-- text -->
  <text x="640" y="120" text-anchor="middle" fill="white" font-size="48" font-weight="bold" font-family="Arial,sans-serif">AAVRITTY</text>
  <text x="640" y="170" text-anchor="middle" fill="#94a3b8" font-size="24" font-family="Arial,sans-serif">Electrical Wholesale Warehouse</text>
  <!-- animated sparks -->
  <circle cx="200" cy="150" r="4" fill="#f97316" opacity="0.8">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="180" r="3" fill="#fbbf24" opacity="0.8">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="120" r="5" fill="#f97316" opacity="0.8">
    <animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
