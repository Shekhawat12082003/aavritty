services:
  postgres:
    image: postgres:16-alpine
    container_name: aavritty-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aavritty
      POSTGRES_PASSWORD: aavritty
      POSTGRES_DB: aavritty_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aavritty -d aavritty_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
